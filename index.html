<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zootopia Artillery — Fatmanur vs Yusuf Eren</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#ff9800;--carrot:#ff6d00;--purple:#6c5ce7;--green:#27ae60;--bg1:#0f0c29;--bg2:#302b63;--bg3:#24243e}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;font-family:'Outfit',sans-serif;overflow:hidden;user-select:none;color:#fff}

/* ─── SCREENS ─── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .5s,transform .5s}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(1.05)}

/* ─── LOGIN SCREEN ─── */
#loginScreen{background:linear-gradient(135deg,#0d0b20 0%,#1a1545 40%,#2d1b69 100%)}
.login-logo{font-size:3.2rem;font-weight:900;letter-spacing:4px;text-shadow:0 0 30px rgba(255,165,0,.4);margin-bottom:8px}
.login-sub{color:rgba(255,255,255,.5);font-size:.9rem;letter-spacing:2px;margin-bottom:40px}
.login-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 50px;display:flex;flex-direction:column;align-items:center;gap:18px;backdrop-filter:blur(10px)}
.login-box input{width:240px;padding:14px 20px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);color:#fff;font-family:'Outfit';font-size:1.1rem;text-align:center;letter-spacing:6px;outline:none;transition:border .3s}
.login-box input:focus{border-color:var(--amber)}
.login-box input::placeholder{color:rgba(255,255,255,.25);letter-spacing:2px;font-size:.9rem}
.login-error{color:#e74c3c;font-size:.85rem;height:20px}

/* ─── CHARACTER SELECT ─── */
#charScreen{background:linear-gradient(135deg,#0d0b20 0%,#1a1545 40%,#2d1b69 100%)}
.char-title{font-size:2rem;font-weight:800;letter-spacing:3px;margin-bottom:10px;text-shadow:0 0 20px rgba(255,165,0,.3)}
.char-sub{color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:35px}
.char-grid{display:flex;gap:30px}
.char-card{width:220px;padding:30px 20px 25px;border-radius:20px;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);cursor:pointer;text-align:center;transition:all .3s cubic-bezier(.25,.8,.25,1)}
.char-card:hover{transform:translateY(-8px);border-color:var(--amber);box-shadow:0 20px 40px rgba(0,0,0,.4),0 0 30px rgba(255,165,0,.15)}
.char-card img{width:120px;height:140px;object-fit:contain;margin-bottom:15px;filter:drop-shadow(0 5px 15px rgba(0,0,0,.5));transition:transform .3s}
.char-card:hover img{transform:scale(1.08)}
.char-card .char-name{font-size:1.3rem;font-weight:800;margin-bottom:4px}
.char-card .char-role{font-size:.8rem;color:rgba(255,255,255,.4);letter-spacing:1px}

/* ─── WAITING SCREEN ─── */
#waitScreen{background:linear-gradient(135deg,#0d0b20 0%,#1a1545 40%,#2d1b69 100%)}
.wait-text{font-size:1.6rem;font-weight:700;letter-spacing:2px;animation:waitPulse 2s infinite alternate}
@keyframes waitPulse{from{opacity:.5;transform:scale(1)}to{opacity:1;transform:scale(1.03)}}
.wait-dots::after{content:'';animation:dots 1.5s steps(4) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* ─── BUTTONS ─── */
.btn{padding:14px 36px;font-size:1rem;font-weight:700;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:'Outfit';letter-spacing:1px;transition:all .25s cubic-bezier(.25,.8,.25,1)}
.btn:hover{transform:translateY(-3px);box-shadow:0 12px 25px rgba(0,0,0,.4)}
.btn-primary{background:linear-gradient(135deg,var(--carrot),var(--amber))}
.btn-secondary{background:linear-gradient(135deg,var(--purple),#a29bfe)}

/* ─── GAME UI ─── */
canvas{border:2px solid rgba(255,255,255,.1);border-radius:14px;cursor:crosshair;box-shadow:0 0 60px rgba(108,92,231,.2)}
#gameUI{position:relative;display:none;flex-direction:column;align-items:center}
#hud{display:flex;gap:14px;margin-top:14px;align-items:center}
.power-btn{width:44px;height:44px;border-radius:50%;font-size:20px;padding:0;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.25);cursor:pointer;background:rgba(0,0,0,.3);transition:all .2s;position:relative;font-family:'Outfit'}
.power-btn:hover:not(:disabled){transform:scale(1.12);box-shadow:0 0 15px rgba(255,255,255,.2)}
.power-btn:disabled{opacity:.25;cursor:not-allowed;transform:none!important}
.power-btn .tip{display:none;position:absolute;bottom:115%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:6px 12px;border-radius:8px;font-size:11px;white-space:nowrap;pointer-events:none;border:1px solid rgba(255,255,255,.1);z-index:10}
.power-btn:hover .tip{display:block}
.power-btn.active{box-shadow:0 0 15px 4px rgba(255,255,255,.6);border-color:#fff}
#powers{display:flex;gap:8px;margin-left:12px}
.status-pill{padding:8px 22px;border-radius:20px;font-size:.85rem;font-weight:700;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);letter-spacing:1px}
#restartBtn{display:none}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div class="screen" id="loginScreen">
  <div class="login-logo">🥕 ZOOTOPIA ARTILLERY 🍦</div>
  <div class="login-sub">ONLINE MULTIPLAYER</div>
  <div class="login-box">
    <input type="password" id="pwdInput" placeholder="Şifre girin" maxlength="10" autofocus>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" id="loginBtn" onclick="tryLogin()">GİRİŞ YAP</button>
  </div>
</div>

<!-- ═══ CHARACTER SELECT ═══ -->
<div class="screen hidden" id="charScreen">
  <div class="char-title">🎬 KARAKTERİNİ SEÇ</div>
  <div class="char-sub">Zootropolis dünyasına hoş geldin!</div>
  <div class="char-grid">
    <div class="char-card" onclick="selectChar('judy')">
      <img src="judy.png" alt="Judy Hopps">
      <div class="char-name">Judy Hopps</div>
      <div class="char-role">🥕 Havuç Fırlatıcı</div>
    </div>
    <div class="char-card" onclick="selectChar('nick')">
      <img src="nick.png" alt="Nick Wilde">
      <div class="char-name">Nick Wilde</div>
      <div class="char-role">🍦 Popsicle Fırlatıcı</div>
    </div>
  </div>
</div>

<!-- ═══ WAITING SCREEN ═══ -->
<div class="screen hidden" id="waitScreen">
  <div style="font-size:4rem;margin-bottom:20px">🎮</div>
  <div class="wait-text">RAKİP BEKLENİYOR<span class="wait-dots"></span></div>
  <div style="color:rgba(255,255,255,.4);font-size:.8rem;margin-top:15px;letter-spacing:1px">Diğer oyuncu bağlandığında oyun otomatik başlayacak</div>
</div>

<!-- ═══ GAME AREA ═══ -->
<div id="gameUI">
  <canvas id="c" width="900" height="600"></canvas>
  <div id="hud">
    <div class="status-pill" id="turnInfo">⏳</div>
    <div id="powers"></div>
    <button class="btn btn-secondary" id="restartBtn" onclick="location.reload()">🔄 Yeniden Oyna</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// ── SCREEN MANAGEMENT ──
const loginScreen=document.getElementById('loginScreen');
const charScreen=document.getElementById('charScreen');
const waitScreen=document.getElementById('waitScreen');
const gameUI=document.getElementById('gameUI');
const pwdInput=document.getElementById('pwdInput');
const loginError=document.getElementById('loginError');
const turnInfo=document.getElementById('turnInfo');
const powersDiv=document.getElementById('powers');
const restartBtn=document.getElementById('restartBtn');

let myPlayerName = '';  // 'Fatmanur' or 'Yusuf Eren'
let myCharacter = '';   // 'judy' or 'nick'

// Enter key on password
pwdInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });

function tryLogin(){
  const pwd = pwdInput.value.trim();
  loginError.textContent = '';
  socket.emit('login', { password: pwd }, (res) => {
    if(res.success){
      loginScreen.classList.add('hidden');
      setTimeout(()=> charScreen.classList.remove('hidden'), 400);
    } else {
      loginError.textContent = '❌ Yanlış şifre!';
      pwdInput.value = '';
      pwdInput.focus();
    }
  });
}

function selectChar(char){
  myCharacter = char;
  myPlayerName = char === 'judy' ? 'Fatmanur' : 'Yusuf Eren';
  charScreen.classList.add('hidden');
  waitScreen.classList.remove('hidden');
  socket.emit('selectCharacter', { playerName: myPlayerName, character: myCharacter });
}

// ── CANVAS & CONSTANTS ──
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d'), W=900, H=600;
const GROUND=H-55, GRAV=0.15, MAX_POW=18, POW_SC=0.08, PR=7;
const WX=W/2, WW=24, WH=280, PW=50, PH=80, MAX_HP=100;
const DMG=20, POWER_DMG=35, STINK_DMG=30, STINK_R=55;

// ── SPRITES ──
const judyImg=new Image(), nickImg=new Image();
judyImg.src='judy.png'; nickImg.src='nick.png';

// ── BACKGROUND ──
const stars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*(GROUND-60),r:Math.random()*1.8+.3,p:Math.random()*Math.PI*2}));
const clouds=[{x:80,y:55,w:100,s:.12},{x:300,y:35,w:80,s:.08},{x:550,y:70,w:110,s:.18},{x:780,y:25,w:65,s:.1}];
const buildings=[];
for(let x=20;x<W;x+=45+Math.random()*20){buildings.push({x,w:30+Math.random()*18,h:60+Math.random()*140,lit:Math.random()>.4})}

// ── POWERS ──
const POWERS={
  DOUBLE:{icon:'⚡',name:'Çift Atış',desc:'Bu turda iki kez at',bg:'#fdcb6e'},
  POWER:{icon:'💥',name:'Güçlü Atış',desc:'Büyük mermi, +%75 hasar',bg:'#e17055'},
  STINK:{icon:'☠️',name:'Koku Bombası',desc:'Alan hasarı, sıçrama',bg:'#a29bfe'},
  HEAL:{icon:'💚',name:'İyileş',desc:'20 HP kazan',bg:'#55efc4'}
};

// ── CLASSES ──
class Player{
  constructor(name,x,img,projColor){
    this.name=name;this.x=x;this.y=GROUND;this.img=img;
    this.hp=MAX_HP;this.projColor=projColor;
    this.flashTimer=0;this.powers={DOUBLE:1,POWER:1,STINK:1,HEAL:1};
    this.activePower=null;this.throwsLeft=1;
    this.breathOffset=Math.random()*Math.PI*2;
  }
  draw(){
    const flash=this.flashTimer>0&&Math.floor(this.flashTimer*15)%2===0;
    const breath=1+Math.sin(tick*.04+this.breathOffset)*.012;
    ctx.save();
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(this.x,this.y+4,32,9,0,0,Math.PI*2);ctx.fill();
    // Sprite
    if(flash){ctx.globalAlpha=0.35}
    const sw=PW*1.7*breath,sh=PH*1.7*breath;
    ctx.drawImage(this.img,this.x-sw/2,this.y-sh+6,sw,sh);
    ctx.globalAlpha=1;
    // Nameplate
    const npW=Math.max(ctx.measureText(this.name).width+20,80);
    ctx.fillStyle='rgba(0,0,0,0.6)';
    roundRect(this.x-npW/2,this.y-sh-8,npW,20,10);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 12px Outfit,sans-serif';ctx.textAlign='center';
    ctx.fillText(this.name,this.x,this.y-sh+8);
    ctx.restore();
    if(this.flashTimer>0)this.flashTimer-=0.016;
  }
  getBounds(){const sw=PW*.8;return{left:this.x-sw/2,right:this.x+sw/2,top:this.y-PH*1.2,bottom:this.y}}
}

class Projectile{
  constructor(x,y,vx,vy,color,w,big,stink){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;
    this.r=big?12:PR;this.wind=w;this.alive=true;this.stink=stink;
    this.big=big;this.trail=[];this.age=0;
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>35)this.trail.shift();
    this.vx+=this.wind;this.vy+=GRAV;this.x+=this.vx;this.y+=this.vy;this.age++;
  }
  draw(){
    for(let i=0;i<this.trail.length;i++){
      const a=i/this.trail.length*0.5;
      const tr=this.r*(0.15+i/this.trail.length*0.4);
      ctx.beginPath();ctx.arc(this.trail[i].x,this.trail[i].y,tr,0,Math.PI*2);
      ctx.fillStyle=this.stink?`rgba(150,100,255,${a})`:`rgba(255,200,50,${a})`;ctx.fill();
    }
    ctx.save();
    const ang=Math.atan2(this.vy,this.vx);
    ctx.translate(this.x,this.y);ctx.rotate(ang);
    if(this.stink){
      ctx.fillStyle='#6c5ce7';ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(162,155,254,0.5)';ctx.beginPath();ctx.arc(2,-2,this.r*0.6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2d3436';ctx.font=`bold ${this.r}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('☠️',0,0);
    }else if(this.color==='#ff6d00'){
      // Carrot
      ctx.fillStyle='#ff6d00';ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(-7,-5);ctx.lineTo(-7,5);ctx.fill();
      ctx.fillStyle='#e65100';ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(-5,-3);ctx.lineTo(-5,3);ctx.fill();
      ctx.fillStyle='#4caf50';
      ctx.beginPath();ctx.ellipse(-8,0,5,2.5,0.3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(-9,-2,4,2,-0.4,0,Math.PI*2);ctx.fill();
    }else{
      // Pawpsicle
      ctx.fillStyle='#8d6e63';ctx.fillRect(-12,-2,14,4);
      ctx.fillStyle='#e53935';roundRect(-2,-6,16,12,5);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(7,-1,4,2.5,0,0,Math.PI*2);ctx.fill();
    }
    if(this.big){ctx.strokeStyle='rgba(255,255,0,0.5)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,this.r+4,0,Math.PI*2);ctx.stroke();}
    ctx.restore();
  }
}

class Particle{
  constructor(x,y,c,sz){
    this.x=x;this.y=y;this.vx=(Math.random()-.5)*(sz||8);this.vy=(Math.random()-.5)*(sz||8)-2;
    this.life=1;this.decay=.012+Math.random()*.025;this.r=2+Math.random()*4;this.c=c;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.06;this.life-=this.decay}
  draw(){if(this.life<=0)return;ctx.globalAlpha=this.life;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.c;ctx.fill();ctx.globalAlpha=1}
}

class FloatText{
  constructor(x,y,t,c){this.x=x;this.y=y;this.t=t;this.c=c;this.life=1}
  update(){this.y-=1.2;this.life-=0.018}
  draw(){
    if(this.life<=0)return;
    ctx.save();ctx.globalAlpha=this.life;
    ctx.font='800 22px Outfit';ctx.textAlign='center';
    ctx.fillStyle='#000';ctx.fillText(this.t,this.x+1,this.y+1);
    ctx.fillStyle=this.c;ctx.fillText(this.t,this.x,this.y);
    ctx.restore();
  }
}

// ── GAME STATE ──
let myRole=null, p1,p2,curP,oppP,turnIdx,proj,particles=[],floatTexts=[],wind=0,gameOver,winner,gameState;
let dragging=false,dsx=0,dsy=0,dex=0,dey=0,screenShake=0,tick=0;
let localShot=false; // true when WE fired, false when opponent fired
const ST={WAIT:'W',ANIM:'A',OVER:'O',NETWORK:'N'};

function initGame(data){
  const myImg = data.myChar==='judy' ? judyImg : nickImg;
  const oppImg = data.oppChar==='judy' ? judyImg : nickImg;
  const myColor = data.myChar==='judy' ? '#ff6d00' : '#e53935';
  const oppColor = data.oppChar==='judy' ? '#ff6d00' : '#e53935';

  if(data.role==='player1'){
    p1=new Player(data.myName,120,myImg,myColor);
    p2=new Player(data.oppName,W-120,oppImg,oppColor);
  }else{
    p1=new Player(data.oppName,120,oppImg,oppColor);
    p2=new Player(data.myName,W-120,myImg,myColor);
  }
  
  myRole=data.role; wind=data.wind; turnIdx=data.turnIndex;
  curP=p1; oppP=p2; proj=null; particles=[]; floatTexts=[];
  gameOver=false; winner=null; gameState=ST.WAIT; dragging=false; screenShake=0;
  curP.throwsLeft=1;
  
  restartBtn.style.display='none';
  updatePowerButtons();
}

// ── SOCKET EVENTS ──
socket.on('waiting', ()=>{
  // Already showing wait screen
});

socket.on('gameStart', (data)=>{
  // Hide ALL overlay screens to be safe
  loginScreen.classList.add('hidden');
  charScreen.classList.add('hidden');
  waitScreen.classList.add('hidden');
  gameUI.style.display='flex';
  initGame(data);
  turnInfo.textContent = isMyTurn() ? '🎯 SENİN SIRAN' : '⏳ RAKİBİN SIRASI';
});

socket.on('opponentLeft', ()=>{
  if(!gameOver){
    gameOver=true; winner=myRole==='player1'?p1:p2; gameState=ST.OVER;
    turnInfo.textContent='❌ Rakip ayrıldı!';
    restartBtn.style.display='inline-block';
  }
});

socket.on('newTurn', (data)=>{
  // Kill any stale projectile to prevent race conditions
  if(proj){proj.alive=false;proj=null;}
  turnIdx=data.turnIndex; wind=data.wind;
  curP=turnIdx===0?p1:p2; oppP=turnIdx===0?p2:p1;
  curP.throwsLeft=1; gameState=ST.WAIT; localShot=false;
  turnInfo.textContent = isMyTurn() ? '🎯 SENİN SIRAN' : '⏳ RAKİBİN SIRASI';
  updatePowerButtons();
});

socket.on('opponentUsedPower', (key)=>{
  // Opponent's player is oppP from our perspective
  const opp = isMyTurn() ? oppP : curP;
  if(key==='HEAL'){
    opp.powers.HEAL--; opp.hp=Math.min(MAX_HP,opp.hp+20);
    spawnExplosion(opp.x,opp.y-50,'#55efc4',20);
    floatTexts.push(new FloatText(opp.x,opp.y-PH,'+20','#55efc4'));
  }else{
    opp.activePower=key;
  }
});

socket.on('opponentFired', (data)=>{
  const shooter = curP;
  let pow=data.pow, ang=data.ang;
  const isBig=data.activePower==='POWER';
  const isStink=data.activePower==='STINK';
  if(data.activePower==='DOUBLE'){shooter.throwsLeft=2;shooter.powers.DOUBLE--}
  if(isBig)shooter.powers.POWER--;
  if(isStink)shooter.powers.STINK--;
  proj=new Projectile(shooter.x,shooter.y-PH,Math.cos(ang)*pow,-Math.sin(ang)*pow,shooter.projColor,wind,isBig,isStink);
  if(data.activePower!=='DOUBLE')shooter.activePower=null;
  localShot=false;
  gameState=ST.ANIM;
});

// Authoritative damage sync from the firing client
socket.on('shotResult', (data)=>{
  p1.hp = data.p1hp;
  p2.hp = data.p2hp;
  // Show visual effects at impact point
  if(data.hitType==='hit' || data.hitType==='splash'){
    const target = data.targetIdx===1 ? p1 : p2;
    target.flashTimer = 0.6;
    screenShake = data.hitType==='hit' ? 12 : 7;
    floatTexts.push(new FloatText(target.x, target.y-PH*1.3, `-${data.dmg}`, '#e74c3c'));
  }
  if(data.heal){
    const target = data.targetIdx===1 ? p1 : p2;
    floatTexts.push(new FloatText(target.x, target.y-PH, '+20', '#55efc4'));
  }
  if(data.p1hp<=0 || data.p2hp<=0){
    gameOver=true;
    winner = data.p1hp<=0 ? p2 : p1;
    gameState=ST.OVER;
    restartBtn.style.display='inline-block';
    turnInfo.textContent=`\u{1F3C6} ${winner.name} Kazand\u{0131}!`;
    updatePowerButtons();
  }
});

// ── HELPERS ──
function isMyTurn(){
  return (myRole==='player1'&&turnIdx===0)||(myRole==='player2'&&turnIdx===1);
}
function getMyPlayer(){return myRole==='player1'?p1:p2}

// ── POWER BUTTONS ──
function updatePowerButtons(){
  powersDiv.innerHTML='';
  if(gameState===ST.OVER||gameState===ST.NETWORK)return;
  const mp=getMyPlayer();
  Object.entries(POWERS).forEach(([key,p])=>{
    const btn=document.createElement('button');
    btn.className='power-btn'+(mp.activePower===key?' active':'');
    btn.style.background=p.bg;
    btn.innerHTML=`${p.icon}<span class="tip">${p.name}: ${p.desc} (${mp.powers[key]})</span>`;
    btn.disabled=!isMyTurn()||mp.powers[key]<=0;
    btn.onclick=()=>usePower(key);
    powersDiv.appendChild(btn);
  });
}

function usePower(key){
  if(gameState!==ST.WAIT||!isMyTurn()||curP.powers[key]<=0)return;
  socket.emit('usePower',key);
  if(key==='HEAL'){
    curP.powers.HEAL--;curP.hp=Math.min(MAX_HP,curP.hp+20);
    spawnExplosion(curP.x,curP.y-50,'#55efc4',20);
    floatTexts.push(new FloatText(curP.x,curP.y-PH,'+20','#55efc4'));
    endTurn();return;
  }
  curP.activePower=curP.activePower===key?null:key;
  updatePowerButtons();
}

// ── INPUT ──
canvas.addEventListener('mousedown',e=>{
  if(gameState!==ST.WAIT||!isMyTurn())return;
  const r=canvas.getBoundingClientRect();
  dsx=(e.clientX-r.left)*(W/r.width);dsy=(e.clientY-r.top)*(H/r.height);dex=dsx;dey=dsy;dragging=true;
});
canvas.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const r=canvas.getBoundingClientRect();dex=(e.clientX-r.left)*(W/r.width);dey=(e.clientY-r.top)*(H/r.height);
});
canvas.addEventListener('mouseup',()=>{if(dragging){dragging=false;fire()}});
canvas.addEventListener('mouseleave',()=>{if(dragging){dragging=false;fire()}});

function fire(){
  const dx=dsx-dex,dy=dsy-dey,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<5)return;
  let pow=Math.min(dist*POW_SC,MAX_POW);
  const ang=Math.atan2(dy,dx);
  const isBig=curP.activePower==='POWER',isStink=curP.activePower==='STINK';
  socket.emit('fire',{pow,ang,activePower:curP.activePower});
  if(curP.activePower==='DOUBLE'){curP.throwsLeft=2;curP.powers.DOUBLE--}
  if(isBig)curP.powers.POWER--;
  if(isStink)curP.powers.STINK--;
  proj=new Projectile(curP.x,curP.y-PH,Math.cos(ang)*pow,-Math.sin(ang)*pow,curP.projColor,wind,isBig,isStink);
  if(curP.activePower!=='DOUBLE')curP.activePower=null;
  localShot=true; // this is OUR shot
  gameState=ST.ANIM;
}

// ── COLLISION ──
function checkColl(){
  if(!proj||!proj.alive)return null;
  const{x,y,r}=proj;
  if(y+r>=GROUND)return'ground';
  if(x<-80||x>W+80||y<-600)return'out';
  if(x+r>WX-WW/2&&x-r<WX+WW/2&&y+r>GROUND-WH&&y-r<GROUND)return'wall';
  const b=oppP.getBounds();
  const cx=Math.max(b.left,Math.min(x,b.right)),cy=Math.max(b.top,Math.min(y,b.bottom));
  if((x-cx)**2+(y-cy)**2<=r*r)return'hit';
  return null;
}

function handleColl(result){
  const{x,y}=proj;
  const isStink=proj.stink;
  const isBig=proj.big;
  const projColor=proj.color;

  if(localShot){
    // --- AUTHORITATIVE (firing client) ---
    if(result==='hit'){
      let dmg=isBig?POWER_DMG:DMG;
      if(isStink)dmg=STINK_DMG;
      oppP.hp=Math.max(0,oppP.hp-dmg); oppP.flashTimer=0.6; screenShake=12;
      spawnExplosion(x,y,isStink?'#6c5ce7':projColor,60);
      floatTexts.push(new FloatText(oppP.x,oppP.y-PH*1.3,`-${dmg}`,'#e74c3c'));
      socket.emit('shotResult',{p1hp:p1.hp, p2hp:p2.hp, dmg, hitType:'hit', targetIdx:oppP===p1?1:2});
      if(oppP.hp<=0){
        gameOver=true;winner=curP;gameState=ST.OVER;
        restartBtn.style.display='inline-block';
        turnInfo.textContent=`\u{1F3C6} ${winner.name} Kazand\u{0131}!`;
        proj=null;updatePowerButtons();return;
      }
    }else if(result==='ground'||result==='wall'){
      screenShake=4;
      if(isStink){
        spawnExplosion(x,y,'#a29bfe',40);
        const dist=Math.sqrt((oppP.x-x)**2+((oppP.y-PH/2)-y)**2);
        if(dist<STINK_R){
          const dmg=Math.round(STINK_DMG*(1-dist/STINK_R));
          oppP.hp=Math.max(0,oppP.hp-dmg); oppP.flashTimer=0.4; screenShake=7;
          floatTexts.push(new FloatText(oppP.x,oppP.y-PH*1.3,`-${dmg}`,'#e74c3c'));
          socket.emit('shotResult',{p1hp:p1.hp, p2hp:p2.hp, dmg, hitType:'splash', targetIdx:oppP===p1?1:2});
          if(oppP.hp<=0){
            gameOver=true;winner=curP;gameState=ST.OVER;
            restartBtn.style.display='inline-block';
            turnInfo.textContent=`\u{1F3C6} ${winner.name} Kazand\u{0131}!`;
            proj=null;updatePowerButtons();return;
          }
        }else{socket.emit('shotResult',{p1hp:p1.hp, p2hp:p2.hp, dmg:0, hitType:'miss'})}
      }else{
        spawnExplosion(x,y,'#999',20);
        socket.emit('shotResult',{p1hp:p1.hp, p2hp:p2.hp, dmg:0, hitType:'miss'});
      }
    }else{
      // 'out'
      socket.emit('shotResult',{p1hp:p1.hp, p2hp:p2.hp, dmg:0, hitType:'miss'});
    }
  }else{
    // --- REMOTE SHOT: visuals only, no damage (damage comes from shotResult) ---
    if(result==='hit'){
      spawnExplosion(x,y,isStink?'#6c5ce7':projColor,60);
    }else if(result==='ground'||result==='wall'){
      if(isStink) spawnExplosion(x,y,'#a29bfe',40);
      else spawnExplosion(x,y,'#999',20);
    }
  }

  proj=null;
  if(!localShot) return;
  curP.throwsLeft--;
  if(curP.throwsLeft>0){gameState=ST.WAIT;updatePowerButtons();return}
  endTurn();
}

function endTurn(){
  curP.activePower=null;
  socket.emit('endTurn',{nextTurn:1-turnIdx});
}

function spawnExplosion(x,y,c,n){
  const colors=[c,'#fff','#ffd54f'];
  for(let i=0;i<n;i++)particles.push(new Particle(x,y,colors[i%colors.length]));
}

// ── DRAWING ──
function drawBg(){
  // Sunset Sky
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,'#0d1b4a');g.addColorStop(0.2,'#1b2d5e');
  g.addColorStop(0.45,'#c0392b');g.addColorStop(0.7,'#e67e22');g.addColorStop(1,'#f9ca24');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,GROUND);
  // Stars
  stars.forEach(s=>{
    const tw=0.3+0.7*Math.sin(tick*0.05+s.p);
    ctx.globalAlpha=tw*(s.y<GROUND*0.35?0.9:0.2);ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()});
  ctx.globalAlpha=1;
  // Clouds
  clouds.forEach(c=>{
    const cx2=((c.x+tick*c.s*0.8)%(W+c.w*2))-c.w;
    ctx.fillStyle='rgba(255,255,255,0.07)';
    ctx.beginPath();ctx.ellipse(cx2,c.y,c.w/2,14,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx2-c.w*.3,c.y+4,c.w*.3,10,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx2+c.w*.25,c.y+2,c.w*.35,11,0,0,Math.PI*2);ctx.fill()});
  // Skyline
  buildings.forEach(b=>{
    ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(b.x,GROUND-b.h,b.w,b.h);
    if(b.lit){
      ctx.fillStyle='rgba(255,200,50,0.12)';
      for(let wy=GROUND-b.h+6;wy<GROUND-4;wy+=10)for(let wx=b.x+4;wx<b.x+b.w-4;wx+=8)ctx.fillRect(wx,wy,4,5);
    }
  });
}

function drawGround(){
  const g=ctx.createLinearGradient(0,GROUND,0,H);
  g.addColorStop(0,'#27ae60');g.addColorStop(.35,'#229954');g.addColorStop(1,'#4e342e');
  ctx.fillStyle=g;ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle='#2ecc71';ctx.lineWidth=1.2;
  for(let x=0;x<W;x+=7){const h=3+Math.sin(x*.7+tick*.02)*2.5;ctx.beginPath();ctx.moveTo(x,GROUND);ctx.lineTo(x+1.5,GROUND-h);ctx.stroke()}
  const fc=['#e91e63','#ffeb3b','#ff9800','#9c27b0'];
  [25,95,180,290,370,480,560,640,720,770,850].forEach((fx,i)=>{ctx.fillStyle=fc[i%fc.length];ctx.beginPath();ctx.arc(fx,GROUND-1.5,2.5,0,Math.PI*2);ctx.fill()});
}

function drawWall(){
  const wx=WX-WW/2,wy=GROUND-WH;
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(wx+WW,wy+8,5,WH-8);
  const wg=ctx.createLinearGradient(wx,0,wx+WW,0);
  wg.addColorStop(0,'#636e72');wg.addColorStop(.5,'#b2bec3');wg.addColorStop(1,'#636e72');
  ctx.fillStyle=wg;ctx.fillRect(wx,wy,WW,WH);
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;
  for(let r=0;r<WH;r+=10){ctx.beginPath();ctx.moveTo(wx,wy+r);ctx.lineTo(wx+WW,wy+r);ctx.stroke();
    if(r%20===0){ctx.beginPath();ctx.moveTo(wx+WW/2,wy+r);ctx.lineTo(wx+WW/2,wy+r+10);ctx.stroke()}}
  ctx.fillStyle='#546e7a';roundRect(wx-2,wy-4,WW+4,6,3);ctx.fill();
}

function drawTrajectory(){
  if(!dragging||gameState!==ST.WAIT||!isMyTurn())return;
  const dx=dsx-dex,dy=dsy-dey,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<5)return;
  let pow=Math.min(dist*POW_SC,MAX_POW);
  const ang=Math.atan2(dy,dx);
  let vx=Math.cos(ang)*pow,vy=-Math.sin(ang)*pow,sx=curP.x,sy=curP.y-PH;
  for(let t=0;t<90;t++){
    vx+=wind;vy+=GRAV;sx+=vx;sy+=vy;
    if(t%3===0){const a=1-t/90;ctx.beginPath();ctx.arc(sx,sy,2.5,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${a*.55})`;ctx.fill()}
    if(sy>=GROUND||sx<0||sx>W)break;
    if(sx>WX-WW/2&&sx<WX+WW/2&&sy>GROUND-WH)break;
  }
  const pct=Math.min(pow/MAX_POW,1);
  ctx.font='bold 14px Outfit,sans-serif';ctx.textAlign='center';
  ctx.fillStyle=`hsl(${120*(1-pct)},80%,50%)`;ctx.fillText(`Güç: ${Math.round(pct*100)}%`,dex,dey-16);
}

function drawHUD(){
  const bw=200,bh=24,by=18;
  drawHP(22,by,bw,bh,p1,true);
  drawHP(W-bw-22,by,bw,bh,p2,false);
  // Wind
  const cx=W/2,cy=30;
  ctx.fillStyle='rgba(0,0,0,0.5)';roundRect(cx-90,cy-14,180,28,14);ctx.fill();
  const str=Math.abs(wind),dv=(str*1000).toFixed(1);
  const arr=wind<-.001?'◀ ':wind>.001?' ▶':'—';
  ctx.fillStyle='#fff';ctx.font='bold 13px Outfit,sans-serif';ctx.textAlign='center';
  ctx.fillText(`💨 Rüzgar: ${dv} ${arr}`,cx,cy+5);
  // Turn indicator
  if(gameState===ST.WAIT){
    const txt=isMyTurn()?'🎯 Senin Sıran!':'⏳ Rakibin Sırası';
    ctx.save();ctx.font='bold 22px Outfit,sans-serif';ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillText(txt,W/2+1,H-13);
    ctx.fillStyle=isMyTurn()?'#2ecc71':'#e67e22';ctx.fillText(txt,W/2,H-14);
    ctx.restore();
  }
  // Active power
  if(curP.activePower&&isMyTurn()){
    const p=POWERS[curP.activePower];
    ctx.fillStyle='rgba(0,0,0,0.55)';roundRect(W/2-75,H-48,150,26,10);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 12px Outfit,sans-serif';ctx.textAlign='center';
    ctx.fillText(`${p.icon} ${p.name} AKTİF`,W/2,H-31);
  }
}

function drawHP(x,y,w,h,player,left){
  const pct=player.hp/MAX_HP;
  ctx.fillStyle='rgba(0,0,0,0.5)';roundRect(x-2,y-2,w+4,h+4,8);ctx.fill();
  const c=pct>.5?'#5c6bc0':pct>.25?'#f39c12':'#c0392b';
  if(pct>0){ctx.fillStyle=c;roundRect(x,y,w*pct,h,6);ctx.fill();}
  if(pct>0){ctx.fillStyle='rgba(255,255,255,0.15)';roundRect(x,y,w*pct,h/2,6);ctx.fill();}
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;roundRect(x,y,w,h,6);ctx.stroke();
  const emoji=player.img===judyImg?'🐰':'🦊';
  ctx.fillStyle='#fff';ctx.font='bold 13px Outfit,sans-serif';
  ctx.textAlign=left?'left':'right';
  ctx.fillText(`${emoji} ${player.name}: ${player.hp}`,left?x+8:x+w-8,y+h-6);
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.5)';roundRect(W/2-220,H/2-95,440,190,20);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;roundRect(W/2-220,H/2-95,440,190,20);ctx.stroke();
  ctx.save();ctx.textAlign='center';ctx.shadowColor='rgba(255,200,0,0.5)';ctx.shadowBlur=20;
  ctx.font='bold 44px Outfit,sans-serif';ctx.fillStyle='#fff';ctx.fillText('🏆 Oyun Bitti!',W/2,H/2-25);
  ctx.font='bold 30px Outfit,sans-serif';ctx.fillStyle='#ffd54f';ctx.fillText(`${winner.name} Kazandı!`,W/2,H/2+30);
  ctx.shadowBlur=0;ctx.restore();
}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

// ── MAIN LOOP ──
function loop(){
  tick++;
  if(!p1)return requestAnimationFrame(loop); // game not started yet
  ctx.save();
  if(screenShake>0){ctx.translate((Math.random()-.5)*screenShake,(Math.random()-.5)*screenShake);screenShake*=.85;if(screenShake<.5)screenShake=0}
  ctx.clearRect(-10,-10,W+20,H+20);
  drawBg();drawGround();drawWall();
  p1.draw();p2.draw();
  if(proj&&proj.alive){proj.update();proj.draw();const r=checkColl();if(r){proj.alive=false;handleColl(r)}}
  for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0)particles.splice(i,1)}
  for(let i=floatTexts.length-1;i>=0;i--){floatTexts[i].update();floatTexts[i].draw();if(floatTexts[i].life<=0)floatTexts.splice(i,1)}
  drawTrajectory();drawHUD();
  if(gameState===ST.OVER)drawGameOver();
  ctx.restore();
  requestAnimationFrame(loop);
}

loop();
</script>
